<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>OpenWebUI Lite · 本地 LLM 聊天</title>
<style>
  :root {
    --bg: #0f1117;
    --panel: #171a23;
    --panel-2: #1f2330;
    --border: #2a2f3d;
    --text: #e6e8ee;
    --muted: #8b93a7;
    --accent: #5b7cfa;
    --accent-2: #3a55c9;
    --user-bubble: #2a3550;
    --bot-bubble: #1d212c;
    --danger: #e0586b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    display: flex;
    flex-direction: column;
    height: 100vh;
  }
  header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 18px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
  }
  header .logo {
    width: 30px; height: 30px; border-radius: 8px;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; color: #fff; font-size: 15px;
  }
  header h1 { font-size: 16px; font-weight: 600; }
  header .sub { color: var(--muted); font-size: 12px; }
  .spacer { flex: 1; }
  select, input, button {
    font-family: inherit; font-size: 14px;
    border-radius: 8px; border: 1px solid var(--border);
    background: var(--panel-2); color: var(--text);
    padding: 8px 12px; outline: none;
  }
  select:focus, input:focus { border-color: var(--accent); }
  button { cursor: pointer; transition: .15s; }
  button:hover { filter: brightness(1.12); }
  button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  button.ghost { background: transparent; }
  button.danger { color: var(--danger); border-color: var(--border); }
  #status { font-size: 12px; color: var(--muted); }
  #status.mock { color: #f0b429; }
  #status.ok { color: #4cc38a; }

  main { flex: 1; overflow-y: auto; padding: 22px; }
  .messages { max-width: 820px; margin: 0 auto; display: flex; flex-direction: column; gap: 16px; }
  .msg { display: flex; gap: 12px; align-items: flex-start; }
  .msg .avatar {
    width: 34px; height: 34px; border-radius: 50%; flex: 0 0 34px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 600; font-size: 13px;
  }
  .msg.user .avatar { background: #3a4d7a; color: #cfe; }
  .msg.bot .avatar { background: var(--accent-2); color: #fff; }
  .msg .bubble {
    background: var(--bot-bubble); padding: 12px 14px; border-radius: 12px;
    line-height: 1.65; white-space: pre-wrap; word-break: break-word;
    border: 1px solid var(--border); max-width: 680px;
  }
  .msg.user { flex-direction: row-reverse; }
  .msg.user .bubble { background: var(--user-bubble); }
  .msg.bot .bubble { background: var(--bot-bubble); }
  .cursor::after { content: "▋"; color: var(--accent); animation: blink 1s steps(1) infinite; }
  @keyframes blink { 50% { opacity: 0; } }

  footer {
    border-top: 1px solid var(--border); background: var(--panel);
    padding: 12px 18px;
  }
  .composer { max-width: 820px; margin: 0 auto; display: flex; gap: 10px; }
  .composer textarea {
    flex: 1; resize: none; min-height: 44px; max-height: 140px;
    border-radius: 10px; border: 1px solid var(--border); background: var(--panel-2);
    color: var(--text); padding: 11px 14px; font-size: 14px; line-height: 1.5; outline: none;
  }
  .composer textarea:focus { border-color: var(--accent); }
  .empty { text-align: center; color: var(--muted); margin-top: 12vh; }
  .empty h2 { font-weight: 500; margin-bottom: 8px; }

  .layout { display: flex; flex: 1; min-height: 0; }
  #sidebar {
    width: 248px; flex: 0 0 248px; border-right: 1px solid var(--border);
    background: var(--panel); display: flex; flex-direction: column; min-height: 0;
  }
  .sidebar-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 14px; border-bottom: 1px solid var(--border);
    font-size: 13px; color: var(--muted);
  }
  .sidebar-head button { padding: 5px 10px; font-size: 12px; }
  .session-list { flex: 1; overflow-y: auto; padding: 8px; display: flex; flex-direction: column; gap: 6px; }
  .session-item {
    display: flex; align-items: center; gap: 8px; padding: 9px 10px;
    border-radius: 8px; border: 1px solid transparent; cursor: pointer; background: var(--panel-2);
  }
  .session-item:hover { border-color: var(--border); }
  .session-item.active { border-color: var(--accent); background: #20263a; }
  .session-item .title { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 13px; }
  .session-item .meta { font-size: 11px; color: var(--muted); }
  .session-item .del { color: var(--danger); border: none; background: transparent; padding: 4px 6px; font-size: 14px; }
  .session-empty { color: var(--muted); font-size: 12px; text-align: center; padding: 16px 8px; }
  @media (max-width: 720px) {
    #sidebar { display: none; }
  }
</style>
</head>
<body>
  <header>
    <div class="logo">OW</div>
    <div>
      <h1>OpenWebUI Lite</h1>
      <div class="sub" id="chatTitle">本地 Ollama · 轻量 LLM 聊天</div>
    </div>
    <div class="spacer"></div>
    <select id="modelSelect" title="选择模型">
      <option value="">加载模型中…</option>
    </select>
    <button id="saveDefaultBtn" class="ghost" title="把当前模型设为默认（重启后自动选中）">★ 默认</button>
    <span id="status">连接中</span>
    <button id="newBtn" class="ghost" title="新对话">新对话</button>
  </header>

  <div class="layout">
    <aside id="sidebar">
      <div class="sidebar-head">
        <span>会话列表</span>
        <button id="newBtn2" class="ghost" title="新对话">+ 新对话</button>
      </div>
      <div class="session-list" id="sessionList">
        <div class="session-empty">加载中…</div>
      </div>
    </aside>

    <main id="main">
      <div class="messages" id="messages">
        <div class="empty" id="empty">
          <h2>开始你的第一段对话</h2>
          <div>在下方输入消息，或先用右上角选择本地模型。无 Ollama 时可用 MOCK 模式演示。</div>
        </div>
      </div>
    </main>
  </div>

  <footer>
    <div class="composer">
      <textarea id="input" placeholder="输入消息，Enter 发送，Shift+Enter 换行…"></textarea>
      <button id="stopBtn" class="danger" style="display:none">停止</button>
      <button id="sendBtn" class="primary">发送</button>
    </div>
  </footer>

<script>
const $ = (id) => document.getElementById(id);

// 触发浏览器下载一段文本为文件（用于会话导出等）
function downloadText(filename, text) {
  const blob = new Blob([text], { type: "text/markdown;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
const messagesEl = $("messages");
const emptyEl = $("empty");
const inputEl = $("input");
const modelSelect = $("modelSelect");
const statusEl = $("status");

let conversation = []; // {role, content}
let streaming = false;
let controller = null;   // AbortController，用于停止生成
let savedStatus = null; // 记录模型状态，生成结束后恢复

function scrollBottom() {
  $("main").scrollTop = $("main").scrollHeight;
}

function addMessage(role, content) {
  if (emptyEl) emptyEl.style.display = "none";
  const wrap = document.createElement("div");
  wrap.className = "msg " + (role === "user" ? "user" : "bot");
  const avatar = document.createElement("div");
  avatar.className = "avatar";
  avatar.textContent = role === "user" ? "我" : "AI";
  const bubble = document.createElement("div");
  bubble.className = "bubble";
  bubble.textContent = content || "";
  wrap.appendChild(avatar);
  wrap.appendChild(bubble);
  messagesEl.appendChild(wrap);
  scrollBottom();
  return bubble;
}

async function loadModels() {
  try {
    const resp = await fetch("/api/models");
    const data = await resp.json();
    const models = data.models || [];
    modelSelect.innerHTML = "";
    if (data.mock) {
      statusEl.textContent = "MOCK 离线模式";
      statusEl.className = "mock";
    } else {
      statusEl.textContent = "Ollama 已连接";
      statusEl.className = "ok";
    }
    savedStatus = { text: statusEl.textContent, cls: statusEl.className };
    models.forEach((m) => {
      const opt = document.createElement("option");
      opt.value = m; opt.textContent = m;
      modelSelect.appendChild(opt);
    });
    if (models.length === 0) {
      const opt = document.createElement("option");
      opt.value = ""; opt.textContent = "（无模型，可手动输入）";
      modelSelect.appendChild(opt);
    }
  } catch (e) {
    statusEl.textContent = "模型加载失败";
    statusEl.className = "";
    modelSelect.innerHTML = '<option value="">（手动输入模型名）</option>';
  }
}

function getModel() {
  let m = modelSelect.value;
  if (m && m.indexOf("（") === -1) return m;
  // 允许手动输入：若下拉只有提示项，尝试用其文本当模型名
  return m || "";
}

function setModelName(name) {
  // 若下拉里没有该模型，新增一个可选项
  let found = false;
  for (const opt of modelSelect.options) {
    if (opt.value === name) { found = true; break; }
  }
  if (!found && name) {
    const opt = document.createElement("option");
    opt.value = name; opt.textContent = name;
    modelSelect.appendChild(opt);
  }
  modelSelect.value = name;
}

function updateTitle(text) {
  const t = (text || "").trim().slice(0, 16);
  document.title = (t ? t + " · " : "") + "OpenWebUI Lite";
  $("chatTitle").textContent = t ? "💬 " + t : "本地 Ollama · 轻量 LLM 聊天";
}

async function send() {
  const text = inputEl.value.trim();
  if (!text || streaming) return;

  const model = getModel();
  // 用户消息入栈
  conversation.push({ role: "user", content: text });
  addMessage("user", text);
  if (conversation.length === 1) updateTitle(text); // 自动标题：取首条消息
  inputEl.value = "";
  inputEl.style.height = "auto";

  // 占位机器人气泡
  const bubble = addMessage("bot", "");
  bubble.classList.add("cursor");
  streaming = true;
  controller = new AbortController();
  // 切换为「停止」按钮 + 生成中状态
  $("sendBtn").style.display = "none";
  $("stopBtn").style.display = "";
  statusEl.textContent = "生成中…";
  statusEl.className = "mock";

  try {
    const resp = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ model, messages: conversation }),
      signal: controller.signal,
    });
    if (!resp.ok) {
      bubble.classList.remove("cursor");
      bubble.textContent = "请求失败：" + resp.status;
      streaming = false;
      return;
    }
    const reader = resp.body.getReader();
    const decoder = new TextDecoder("utf-8");
    let buf = "";
    let acc = "";

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      // SSE 按空行分片
      let idx;
      while ((idx = buf.indexOf("\n\n")) !== -1) {
        const raw = buf.slice(0, idx);
        buf = buf.slice(idx + 2);
        const evMatch = raw.match(/^event: (.+)$/m);
        const dataMatch = raw.match(/^data: (.+)$/m);
        if (!dataMatch) continue;
        const event = evMatch ? evMatch[1] : "message";
        let payload;
        try { payload = JSON.parse(dataMatch[1]); } catch { continue; }
        if (event === "token") {
          acc += payload;
          bubble.textContent = acc;
          scrollBottom();
        } else if (event === "done") {
          bubble.classList.remove("cursor");
        } else if (event === "error") {
          bubble.classList.remove("cursor");
          bubble.textContent = "错误：" + payload;
        }
      }
    }
    // 把完整回复入栈历史
    conversation.push({ role: "bot", content: acc });
  } catch (e) {
    bubble.classList.remove("cursor");
    bubble.textContent = "连接异常：" + e.message;
  } finally {
    bubble.classList.remove("cursor");
    streaming = false;
    controller = null;
    // 恢复按钮与状态
    $("sendBtn").style.display = "";
    $("stopBtn").style.display = "none";
    if (savedStatus) {
      statusEl.textContent = savedStatus.text;
      statusEl.className = savedStatus.cls;
    }
    scrollBottom();
  }
}

function stopGen() {
  if (controller) controller.abort();
}

async function newChat() {
  if (streaming) return;
  try {
    await fetch("/api/new", { method: "POST" });
  } catch (e) {}
  conversation = [];
  updateTitle("");
  messagesEl.innerHTML = "";
  const e = document.createElement("div");
  e.className = "empty";
  e.id = "empty";
  e.innerHTML = "<h2>新的对话已开始</h2><div>上下文已清空。</div>";
  messagesEl.appendChild(e);
  const ne = $("empty");
  if (ne) ne.style.display = "";
  loadSessions(); // 同步侧边栏当前会话高亮
}

// ---- 多会话管理（让后端 /api/sessions 能力在界面可用）----
async function loadSessions() {
  const listEl = $("sessionList");
  if (!listEl) return;
  try {
    const resp = await fetch("/api/sessions");
    const data = await resp.json();
    const sessions = data.sessions || [];
    const current = data.current;
    if (!sessions.length) {
      listEl.innerHTML = '<div class="session-empty">暂无历史会话</div>';
      return;
    }
    listEl.innerHTML = "";
    for (const s of sessions) {
      const item = document.createElement("div");
      item.className = "session-item" + (s.id === current ? " active" : "");
      const title = document.createElement("div");
      title.className = "title";
      title.textContent = s.title || "（未命名会话）";
      title.title = s.title || "（未命名会话）";
      const meta = document.createElement("div");
      meta.className = "meta";
      meta.textContent = `${s.message_count} 条`;
      const del = document.createElement("button");
      del.className = "del";
      del.textContent = "×";
      del.title = "删除会话";
      del.addEventListener("click", async (ev) => {
        ev.stopPropagation();
        if (!confirm("确定删除该会话？")) return;
        try {
          await fetch("/api/sessions/" + s.id, { method: "DELETE" });
        } catch (e) {}
        if (s.id === current) newChat();
        loadSessions();
      });
      const exp = document.createElement("button");
      exp.className = "del";
      exp.textContent = "⭳";
      exp.title = "导出会话为 Markdown";
      exp.addEventListener("click", async (ev) => {
        ev.stopPropagation();
        try {
          const r = await fetch("/api/sessions/" + s.id + "/export");
          const data = await r.json();
          downloadText((data.title || "session") + ".md", data.markdown || "");
        } catch (e) {}
      });
      item.appendChild(title);
      item.appendChild(meta);
      item.appendChild(exp);
      item.appendChild(del);
      item.addEventListener("click", () => switchSession(s.id));
      listEl.appendChild(item);
    }
  } catch (e) {
    listEl.innerHTML = '<div class="session-empty">会话加载失败</div>';
  }
}

async function switchSession(id) {
  if (streaming) return;
  try {
    await fetch("/api/sessions/" + id + "/switch", { method: "POST" });
  } catch (e) {}
  loadSessions();
  // 重新加载该会话的消息到对话区
  try {
    const resp = await fetch("/api/history");
    const data = await resp.json();
    const msgs = data.messages || [];
    conversation = [];
    messagesEl.innerHTML = "";
    if (!msgs.length) {
      const e = document.createElement("div");
      e.className = "empty"; e.id = "empty";
      e.innerHTML = "<h2>开始你的第一段对话</h2><div>在下方输入消息开始。</div>";
      messagesEl.appendChild(e);
    } else {
      if (emptyEl) emptyEl.style.display = "none";
      for (const m of msgs) {
        addMessage(m.role, m.content || "");
        conversation.push({ role: m.role, content: m.content || "" });
      }
    }
    const firstUser = msgs.find((m) => m.role === "user");
    if (firstUser) updateTitle(firstUser.content);
    if (data.model) setModelName(data.model);
  } catch (e) {}
}

// 事件绑定
$("sendBtn").addEventListener("click", send);
$("stopBtn").addEventListener("click", stopGen);
$("newBtn").addEventListener("click", newChat);
$("newBtn2").addEventListener("click", newChat);
$("saveDefaultBtn").addEventListener("click", saveDefaultModel);
inputEl.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
});
inputEl.addEventListener("input", () => {
  inputEl.style.height = "auto";
  inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + "px";
});

// 默认模型记忆：把当前选择持久化到后端 /api/settings
async function saveDefaultModel() {
  const m = getModel();
  if (!m) { alert("请先选择或输入一个模型名称"); return; }
  try {
    await fetch("/api/settings", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ default_model: m }),
    });
    statusEl.textContent = "已保存默认模型：" + m;
    setTimeout(() => { if (savedStatus) { statusEl.textContent = savedStatus.text; statusEl.className = savedStatus.cls; } }, 1500);
  } catch (e) {
    statusEl.textContent = "保存默认模型失败";
  }
}

// 页面加载时恢复已持久化的「默认模型」（让后端默认模型记忆在 UI 可见）
async function loadSettings() {
  try {
    const resp = await fetch("/api/settings");
    const data = await resp.json();
    if (data.default_model) setModelName(data.default_model);
  } catch (e) { /* 设置加载失败不阻断主流程 */ }
}

// 页面加载时恢复已持久化的历史（打通「重启保留」承诺）
async function loadHistory() {
  try {
    const resp = await fetch("/api/history");
    const data = await resp.json();
    const msgs = data.messages || [];
    if (!msgs.length) return;
    if (emptyEl) emptyEl.style.display = "none";
    conversation = [];
    for (const m of msgs) {
      addMessage(m.role, m.content || "");
      conversation.push({ role: m.role, content: m.content || "" });
    }
    if (data.model) setModelName(data.model);
    const firstUser = msgs.find((m) => m.role === "user");
    if (firstUser) updateTitle(firstUser.content);
  } catch (e) { /* 历史加载失败不阻断主流程 */ }
}

loadModels();
loadHistory();
loadSettings();
loadSessions();
</script>
</body>
</html>
